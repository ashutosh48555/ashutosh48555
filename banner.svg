<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
<defs>
  <filter id="g1" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="g2" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="9" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="g3" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="18" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    @keyframes fp{0%,100%{opacity:.9}50%{opacity:.55}}
    @keyframes scan{0%{transform:translateY(-280px)}100%{transform:translateY(280px)}}
    .cur{animation:blink 1s step-end infinite}
    .tag{animation:fp 3.5s ease-in-out infinite}
  </style>
</defs>

<!-- Background -->
<rect width="900" height="280" fill="#0d1117"/>

<!-- Scanline sweep -->
<rect width="900" height="4" fill="#00FF88" opacity="0.03" style="animation:scan 4s linear infinite"/>

