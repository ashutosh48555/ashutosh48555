<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" style="border-radius:8px">
<defs>
  <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
    <rect x="1" y="1" width="12" height="12" rx="2" fill="#161b22"/>
  </pattern>
  <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="hglow" x="-70%" y="-70%" width="240%" height="240%">
    <feGaussianBlur stdDeviation="12" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="tglow" x="-15%" y="-15%" width="130%" height="130%">
    <feGaussianBlur stdDeviation="14" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    @keyframes pulse{0%,100%{opacity:.20}50%{opacity:.08}}
    @keyframes sqf{0%,100%{opacity:.85}50%{opacity:.55}}
    .ashu{animation:pulse 3.5s ease-in-out infinite}
    .sq4{animation:sqf 3.8s ease-in-out infinite}
    .sq3{animation:sqf 5.1s ease-in-out infinite}
    .sq2{animation:sqf 6.4s ease-in-out infinite}
  </style>
</defs>

<rect width="900" height="180" fill="#0d1117"/>
<rect width="900" height="180" fill="url(#grid)"/>

